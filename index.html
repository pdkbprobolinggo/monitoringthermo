<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Termovisi UPT Probolinggo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
              colors: {
                  'pln-blue': '#2563eb',
              }
          }
        }
      }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f4f6f9] dark:bg-slate-900 transition-colors duration-300 font-sans">
    
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;

        const SPREADSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vShldBvCN8_xdns1rbXiGwqgdNkfT1K1BFtagsT9wB3XStky8eSxV47YQJcFIdzTLvDBasIcjtUFrJ_/pub?output=csv'; 

        // --- Logika Cerdas Pengecekan Tanggal (Exp > 120 Hari) ---
        const isExpired = (dateStr) => {
            if (!dateStr || dateStr.trim() === '-' || dateStr.trim() === '') return false;
            
            let d = null;
            
            // Coba format DD/MM/YYYY atau DD-MM-YYYY
            let match = dateStr.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
            if (match) {
                d = new Date(parseInt(match[3]), parseInt(match[2])-1, parseInt(match[1]));
            } else {
                // Coba format Indonesia: DD Bulan YYYY (misal: 12 Juni 2024)
                const months = { 'januari':0, 'jan':0, 'februari':1, 'feb':1, 'maret':2, 'mar':2, 'april':3, 'apr':3, 'mei':4, 'juni':5, 'jun':5, 'juli':6, 'jul':6, 'agustus':7, 'agu':7, 'september':8, 'sep':8, 'oktober':9, 'okt':9, 'november':10, 'nov':10, 'desember':11, 'des':11 };
                let parts = dateStr.toLowerCase().replace(/,/g, '').split(/\s+/);
                if(parts.length >= 3) {
                    let day = parseInt(parts[0]);
                    let month = months[parts[1]];
                    let year = parseInt(parts[2]);
                    if(!isNaN(day) && month !== undefined && !isNaN(year)) {
                        d = new Date(year, month, day);
                    }
                } else {
                    // Fallback ke pembacaan default JS (seperti YYYY-MM-DD)
                    let parsed = new Date(dateStr);
                    if (!isNaN(parsed.getTime())) d = parsed;
                }
            }
            
            // Jika berhasil dijadikan format waktu, hitung selisihnya dari hari ini
            if (d && !isNaN(d.getTime())) {
                const now = new Date();
                const diffTime = now - d;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays > 120; // TRUE jika lebih dari 120 hari
            }
            return false;
        };

        function App() {
            const [rawData, setRawData] = useState([]);
            const [termoData, setTermoData] = useState([]);
            const [csvHeaders, setCsvHeaders] = useState([]); 
            const [viewType, setViewType] = useState('TOWER'); 
            const [expandedUltg, setExpandedUltg] = useState({});
            const [isLoading, setIsLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [tableUltgFilter, setTableUltgFilter] = useState('ALL');
            const [tableStatusFilter, setTableStatusFilter] = useState('ALL');

            useEffect(() => {
                isDarkMode ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const parseCSVRow = (str) => {
                let arr = []; let quote = false; let col = '';
                for (let i = 0; i < str.length; i++) {
                    let cc = str[i], nc = str[i+1];
                    if (cc === '"' && quote && nc === '"') { col += cc; i++; continue; }
                    if (cc === '"') { quote = !quote; continue; }
                    if (cc === ',' && !quote) { arr.push(col.trim()); col = ''; continue; }
                    col += cc;
                }
                arr.push(col.trim());
                return arr;
            };

            useEffect(() => {
                fetch(`${SPREADSHEET_CSV_URL}&_t=${new Date().getTime()}`)
                  .then(r => r.text())
                  .then(text => {
                    const rows = text.split(/\r?\n/).filter(line => line.trim() !== '').map(l => parseCSVRow(l));
                    const headers = rows[0];
                    setCsvHeaders(headers); 
                    
                    const idxUltg = headers.findIndex(h => h.toLowerCase().includes('ultg') || h.toLowerCase().includes('pemilik'));
                    const idxGi = headers.findIndex(h => h.toLowerCase().includes('gardu') || h.toLowerCase().includes('gi'));
                    const idxStatus = headers.findIndex(h => h.toLowerCase().includes('status'));

                    const parsedData = rows.slice(1).map((r, i) => {
                        let currentStatus = 'BELUM';
                        if (idxStatus !== -1 && r[idxStatus]) {
                            currentStatus = r[idxStatus].toUpperCase().includes('SUDAH') ? 'SUDAH' : 'BELUM';
                        }

                        return {
                            id: i,
                            ultg: idxUltg !== -1 ? r[idxUltg] : (r[2] || ""), 
                            gi: idxGi !== -1 ? r[idxGi] : (r[3] || ""),       
                            status: currentStatus,
                            rawRow: r
                        };
                    }).filter(d => d.ultg !== "");
                    setRawData(parsedData);
                  })
                  .finally(() => setIsLoading(false));
            }, []);

            useEffect(() => {
                const ultgMap = {};
                const allowedUltgs = ["ULTG JEMBER", "ULTG PROBOLINGGO", "ULTG BANGIL"];

                rawData.forEach(item => {
                    let ultgName = item.ultg.trim().toUpperCase();
                    if(!ultgName.includes("ULTG")) ultgName = "ULTG " + ultgName;

                    if (!allowedUltgs.includes(ultgName)) return;

                    if (!ultgMap[ultgName]) {
                        ultgMap[ultgName] = { id: ultgName.replace(/\s+/g, '-').toLowerCase(), name: ultgName, total: 0, sudah: 0, garduIndukMap: {} };
                    }
                    
                    const isSudah = item.status === 'SUDAH';
                    ultgMap[ultgName].total += 1;
                    if(isSudah) ultgMap[ultgName].sudah += 1;

                    const giName = item.gi.trim().toUpperCase();
                    if (!ultgMap[ultgName].garduIndukMap[giName]) {
                        ultgMap[ultgName].garduIndukMap[giName] = { nama: giName, total: 0, sudah: 0 };
                    }
                    ultgMap[ultgName].garduIndukMap[giName].total += 1;
                    if(isSudah) ultgMap[ultgName].garduIndukMap[giName].sudah += 1;
                });

                const extractedData = Object.values(ultgMap).map((group, index) => {
                    group.percentage = group.total > 0 ? Math.round((group.sudah / group.total) * 100) : 0;
                    group.color = ['blue', 'emerald', 'amber'][index % 3];
                    group.garduInduk = Object.values(group.garduIndukMap).map(gi => ({
                        ...gi, persentase: gi.total > 0 ? Math.round((gi.sudah / gi.total) * 100) : 0
                    }));
                    return group;
                });

                setTermoData(extractedData);
            }, [rawData]);

            let filteredTableData = rawData.filter(d => {
                let ultgMatch = tableUltgFilter === 'ALL' || (d.ultg.toUpperCase().includes(tableUltgFilter.replace('ULTG ', '')));
                let statusMatch = tableStatusFilter === 'ALL' || d.status === tableStatusFilter;
                return ultgMatch && statusMatch;
            });

            const towerIndices = [2, 3, 4, 5, 6, 8, 9, 10, 11];
            const midspanIndices = [2, 3, 4, 5, 6, 9, 10, 11];
            
            const currentIndices = viewType === 'TOWER' ? towerIndices : midspanIndices;
            const currentHeaders = currentIndices.map(i => csvHeaders[i] ? csvHeaders[i].toUpperCase() : "-");

            // Mencari indeks kolom yang mengandung kata "TANGGAL" untuk mengecek kadaluarsa
            const dateColIndices = currentIndices.filter(colIdx => csvHeaders[colIdx] && csvHeaders[colIdx].toUpperCase().includes('TANGGAL'));

            return (
                <div className="p-8">
                    <header className="mb-8 flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Dashboard Termovisi UPT Probolinggo</h1>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="px-4 py-2 bg-slate-200 rounded-lg hover:bg-slate-300 transition-colors font-semibold">Toggle Theme</button>
                    </header>

                    {/* Ringkasan */}
                    <section className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        {termoData.map(u => (
                            <div key={u.id} className="bg-white p-6 rounded-2xl shadow border-l-4 border-blue-500">
                                <p className="font-bold text-slate-500">{u.name}</p>
                                <p className="text-5xl font-black my-2">{u.percentage}%</p>
                                <p className="text-sm">Total: {u.total} Titik</p>
                            </div>
                        ))}
                    </section>

                    {/* Tabel */}
                    <section className="bg-white p-6 rounded-2xl shadow border border-slate-200">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                                Detail Data Titik Termovisi
                            </h2>
                            
                            <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                                <div className="bg-slate-100 dark:bg-slate-800 p-1 rounded-lg inline-flex shadow-inner">
                                    <button 
                                        onClick={() => setViewType('TOWER')} 
                                        className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-300 ${viewType === 'TOWER' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}
                                    >
                                        TOWER
                                    </button>
                                    <button 
                                        onClick={() => setViewType('MIDSPAN')} 
                                        className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-300 ${viewType === 'MIDSPAN' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}
                                    >
                                        MIDSPAN JOINT
                                    </button>
                                </div>

                                <select onChange={(e) => setTableUltgFilter(e.target.value)} className="border border-slate-300 p-2 rounded-lg bg-slate-50 font-semibold text-slate-700 focus:outline-none focus:border-blue-500 text-sm cursor-pointer hover:bg-slate-100 transition-colors">
                                   <option value="ALL">Semua ULTG</option>
                                   <option value="JEMBER">ULTG Jember</option>
                                   <option value="PROBOLINGGO">ULTG Probolinggo</option>
                                   <option value="BANGIL">ULTG Bangil</option>
                               </select>
                            </div>
                        </div>
                        <div className="overflow-x-auto rounded-xl border border-slate-200">
                            <table className="w-full text-left min-w-[1000px]">
                                <thead className="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold tracking-wider">
                                    <tr>
                                        <th className="p-4 border-b border-slate-200">NO</th>
                                        {currentHeaders.map((th, idx) => (
                                            <th key={idx} className="p-4 border-b border-slate-200">{th}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm text-slate-700">
                                    {filteredTableData.map((row, i) => (
                                        <tr key={row.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 text-slate-400 font-medium">{i + 1}</td>
                                            {currentIndices.map((colIdx, idx) => {
                                                const colData = row.rawRow[colIdx] || "-";
                                                const isStatusCol = colData.toUpperCase().trim() === 'SUDAH' || colData.toUpperCase().trim() === 'BELUM';
                                                
                                                // Cek apakah kolom ini adalah kolom Tanggal dan usianya > 120 hari
                                                const isDateCol = dateColIndices.includes(colIdx);
                                                const isWarning = isDateCol && isExpired(colData);

                                                return (
                                                    <td key={idx} className="p-4">
                                                        {isStatusCol ? (
                                                            <span className={`px-3 py-1 rounded-full text-[11px] font-bold border ${colData.toUpperCase().trim() === 'SUDAH' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>
                                                                {colData.toUpperCase().trim()}
                                                            </span>
                                                        ) : (
                                                            <div className="flex items-center">
                                                                {colData}
                                                                {/* Menampilkan Icon Jam Kuning jika sudah lebih dari 120 Hari */}
                                                                {isWarning && (
                                                                    <div className="relative group ml-2 flex items-center">
                                                                        <i className="fas fa-clock text-amber-500 animate-pulse text-base cursor-help"></i>
                                                                        <span className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 w-max px-2 py-1 bg-slate-800 text-white text-[10px] font-semibold rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                                                            Data lebih dari 120 hari
                                                                        </span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
