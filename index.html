<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Termovisi UPT Probolinggo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <!-- Pustaka Dasar (React, Babel, PapaParse, Leaflet) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Menggunakan versi Babel yang dipatok stabil untuk menghindari error modul otomatis -->
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans">
    
    <div id="root"></div>

    <!-- Script Utama -->
    <script type="text/babel" data-presets="react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        
        const { useState, useEffect, useRef } = React;

        function App() {
            const [data, setData] = useState([]);
            const [stats, setStats] = useState([]);
            const [loading, setLoading] = useState(true);
            
            // Pengaman Peta agar tidak error
            const mapRef = useRef(null);
            const layerRef = useRef(null);
            const mapContainerRef = useRef(null);

            // 1. Tarik Data CSV
            useEffect(() => {
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vShldBvCN8_xdns1rbXiGwqgdNkfT1K1BFtagsT9wB3XStky8eSxV47YQJcFIdzTLvDBasIcjtUFrJ_/pub?output=csv&_t=' + Date.now();
                
                fetch(csvUrl)
                    .then(res => res.text())
                    .then(csv => {
                        Papa.parse(csv, {
                            skipEmptyLines: true,
                            complete: (res) => {
                                // Ambil data mulai dari baris ke-2 (melewati judul)
                                const validRows = res.data.slice(1).filter(r => r.length > 5);
                                setData(validRows);
                                setLoading(false);
                            }
                        });
                    })
                    .catch(err => {
                        console.error("Gagal menarik data:", err);
                        setLoading(false);
                    });
            }, []);

            // 2. Kalkulasi Ringkasan ULTG
            useEffect(() => {
                const counts = { 
                    "ULTG JEMBER": { total: 0, sudah: 0 }, 
                    "ULTG PROBOLINGGO": { total: 0, sudah: 0 }, 
                    "ULTG BANGIL": { total: 0, sudah: 0 } 
                };
                
                data.forEach(row => {
                    const text = row.join(' ').toUpperCase();
                    let area = null;
                    
                    if (text.includes("JEMBER")) area = "ULTG JEMBER";
                    else if (text.includes("PROBOLINGGO")) area = "ULTG PROBOLINGGO";
                    else if (text.includes("BANGIL")) area = "ULTG BANGIL";

                    if (area) {
                        counts[area].total++;
                        // Cek status SUDAH dari keseluruhan teks di baris tersebut
                        if (text.includes("SUDAH")) {
                            counts[area].sudah++;
                        }
                    }
                });

                const statsArray = Object.keys(counts).map(key => ({
                    name: key,
                    total: counts[key].total,
                    sudah: counts[key].sudah,
                    pct: counts[key].total > 0 ? Math.round((counts[key].sudah / counts[key].total) * 100) : 0
                }));
                
                setStats(statsArray);
            }, [data]);

            // 3. Render Peta & Titik Koordinat
            useEffect(() => {
                // Buat peta hanya sekali saat wadahnya sudah siap
                if (mapContainerRef.current && !mapRef.current) {
                    mapRef.current = L.map(mapContainerRef.current).setView([-7.75, 113.21], 8);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapRef.current);
                    layerRef.current = L.layerGroup().addTo(mapRef.current);
                }

                // Tambahkan titik-titik ke peta
                if (layerRef.current && data.length > 0) {
                    layerRef.current.clearLayers();
                    
                    data.forEach(row => {
                        // Ambil koordinat di kolom M (12) dan N (13)
                        const latStr = String(row[12] || '').replace(',', '.');
                        const lngStr = String(row[13] || '').replace(',', '.');
                        
                        const lat = parseFloat(latStr);
                        const lng = parseFloat(lngStr);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            // Tentukan status dari Kolom K (10)
                            const status = (row[10] || '').toUpperCase().includes('SUDAH') ? 'SUDAH' : 'BELUM';
                            const color = status === 'SUDAH' ? '#10b981' : '#ef4444'; // Hijau atau Merah
                            
                            const icon = L.divIcon({
                                className: 'custom-icon',
                                html: `<div style="background-color: ${color}; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.4);"></div>`,
                                iconSize: [16, 16],
                                iconAnchor: [8, 8]
                            });

                            // Ambil nama Tower dari Kolom E (4)
                            const towerInfo = row[4] || '-';
                            
                            L.marker([lat, lng], { icon })
                             .bindPopup(`<b>Tower ${towerInfo}</b><br>Status: ${status}`)
                             .addTo(layerRef.current);
                        }
                    });
                }
            }, [data]);

            return (
                <div className="max-w-6xl mx-auto space-y-6">
                    {/* Header Sederhana */}
                    <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                        <div className="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-lg text-xl">
                            <i className="fas fa-camera"></i>
                        </div>
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Dashboard Termovisi</h1>
                            <p className="text-slate-500 text-sm">UPT Probolinggo - Sistem Stabil</p>
                        </div>
                    </header>

                    {/* Indikator Loading */}
                    {loading && (
                        <div className="bg-blue-50 text-blue-600 p-4 rounded-xl flex items-center gap-3">
                            <i className="fas fa-spinner fa-spin"></i>
                            <span className="font-medium">Memuat data dari Spreadsheet...</span>
                        </div>
                    )}

                    {/* Wadah Peta */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <h2 className="font-bold text-slate-700 mb-3 flex items-center gap-2">
                            <i className="fas fa-map-marker-alt text-red-500"></i> Peta Titik Termovisi
                        </h2>
                        {/* Referensi div langsung ke Leaflet (Anti-Crash) */}
                        <div ref={mapContainerRef} className="w-full h-[400px] rounded-lg bg-slate-100 border border-slate-300 z-0 relative"></div>
                    </div>

                    {/* Kartu Ringkasan */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {stats.map(s => (
                            <div key={s.name} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <div className="w-full bg-slate-100 h-1.5 mb-4 rounded-full overflow-hidden">
                                    <div className="bg-blue-500 h-full" style={{ width: s.pct + '%' }}></div>
                                </div>
                                <h3 className="text-sm font-bold text-slate-500">{s.name}</h3>
                                <p className="text-4xl font-black text-slate-800 my-2">{s.pct}%</p>
                                <p className="text-sm font-medium text-slate-500">Selesai: {s.sudah} dari {s.total} Titik</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
